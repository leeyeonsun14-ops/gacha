*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#1c1917;font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;color:#e7e5e4;min-height:100vh}
input,button,select{font-family:inherit}
.wrap{max-width:430px;margin:0 auto;min-height:100vh}
.hd{background:#292524;border-bottom:1px solid #44403c;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-weight:900;font-size:18px;color:#fbbf24}

.tb{flex:1;padding:11px 4px;background:transparent;border:none;border-bottom:2px solid transparent;color:#78716c;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;min-width:55px}

.card{background:#292524;border-radius:16px;padding:18px 16px;border:1px solid #44403c;margin-bottom:12px}
.inp{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #44403c;background:#1c1917;color:#e7e5e4;font-size:15px;outline:none}
.inp:focus{border-color:#f59e0b}
.btn{width:100%;padding:13px;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer}
.bg{background:#f59e0b;color:#1c1917}
.bg:disabled{background:#44403c;color:#78716c;cursor:not-allowed}
.bd{background:#78350f;color:#fbbf24}
.badge{background:#1c1917;border:1px solid #44403c;border-radius:10px;padding:6px 12px;color:#fbbf24;font-weight:800;font-size:14px}
.mrow{background:#1c1917;border-radius:12px;padding:13px 16px;margin-bottom:8px;border:1px solid #44403c;display:flex;align-items:center;justify-content:space-between}
.dbtn{padding:6px 12px;background:transparent;border:1px solid #ef444466;color:#ef4444;border-radius:8px;font-size:12px;cursor:pointer;font-weight:700}
.lrow{background:#1c1917;border-radius:12px;padding:12px 16px;margin-bottom:8px;border:1px solid #44403c;display:flex;align-items:center;gap:12px}
.empty{text-align:center;padding:60px 20px;color:#78716c}
.toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);background:#292524;border:1px solid #4ade80;color:#4ade80;padding:11px 24px;border-radius:24px;font-weight:800;font-size:14px;z-index:999;white-space:nowrap}
.cdrop{position:fixed;top:15%;left:50%;transform:translateX(-50%);font-size:32px;z-index:999;pointer-events:none;animation:fall .85s ease-in forwards}
@keyframes fall{0%{top:15%;opacity:1}100%{top:65%;opacity:0}}
.pburst{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:3px solid rgba(255,255,255,.3);animation:burstIn .5s ease forwards}

select.inp{appearance:none;cursor:pointer}
.sinp{padding:9px 11px;border-radius:10px;border:1px solid #44403c;background:#1c1917;color:#e7e5e4;font-size:14px;outline:none;width:100%}
.qb{flex:1;padding:9px 4px;border:1px solid #44403c;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;background:transparent;color:#78716c}

<div class="wrap" id="root"></div>
<script>
var ADMIN_PW = "admin1234";
var FB = "https://gacha-31-default-rtdb.firebaseio.com";
var DP = [
  {id:"연차", emoji:"🏖️", color:"#f59e0b", rare:30},
  {id:"투피드", emoji:"🍔", color:"#34d399", rare:40},
  {id:"출근확인증", emoji:"📋", color:"#60a5fa", rare:30}
];

// Firebase - 완전 비동기, 절대 블로킹 없음
function fget(p) {
return new Promise(function(resolve) {
var done = false;
var timer = setTimeout(function() {
if (!done) { done = true; resolve(null); }
}, 4000);
fetch(FB + p + “.json”)
.then(function(r) { return r.json(); })
.then(function(d) {
if (!done) { done = true; clearTimeout(timer); resolve(d); }
})
.catch(function() {
if (!done) { done = true; clearTimeout(timer); resolve(null); }
});
});
}
function fset(p, v) {
fetch(FB + p + “.json”, {method:“PUT”, headers:{“Content-Type”:“application/json”}, body:JSON.stringify(v)}).catch(function(){});
}
function fpatch(p, v) {
fetch(FB + p + “.json”, {method:“PATCH”, headers:{“Content-Type”:“application/json”}, body:JSON.stringify(v)}).catch(function(){});
}

var S = {
role:null, nick:””,
members:[], users:{}, log:[], prizes:DP, cost:1,
adminTab:“members”, mTab:“machine”,
spinning:false, cdrop:false, prize:null, showPrize:false,
giveTarget:””, giveAmt:1, newMember:””,
ni:””, pi:””, loginErr:””, pwErr:””,
toast:””, editPrizes:null
};

var tT = null;
function toast(msg) {
S.toast = msg; render();
if (tT) clearTimeout(tT);
tT = setTimeout(function() { S.toast = “”; render(); }, 2500);
}
function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

function loadAll() {
return Promise.all([
fget(”/gacha/members”), fget(”/gacha/users”),
fget(”/gacha/log”), fget(”/gacha/prizes”), fget(”/gacha/cost”)
]).then(function(res) {
S.members = res[0] ? Object.values(res[0]) : [];
S.users = res[1] || {};
S.log = res[2] ? Object.values(res[2]).reverse() : [];
S.prizes = res[3] || DP;
S.cost = res[4] || 1;
}).catch(function() {});
}

function randPrize() {
var t = S.prizes.reduce(function(s, p) { return s + Number(p.rare); }, 0);
var r = Math.random() * t;
for (var i = 0; i < S.prizes.length; i++) {
r -= Number(S.prizes[i].rare);
if (r <= 0) return S.prizes[i];
}
return S.prizes[0];
}

function tryLogin() {
var name = S.ni.trim();
if (!name) return;
S.loginErr = “”;
// 로그인 화면 유지하면서 백그라운드로 확인
fget(”/gacha/members”).then(function(m) {
var list = m ? Object.values(m) : [];
if (list.length > 0 && list.indexOf(name) < 0) {
S.loginErr = “등록된 멤버가 아니에요 🚫”;
render(); return;
}
return fget(”/gacha/users/” + name).then(function(ex) {
if (!ex) fset(”/gacha/users/” + name, {stocks:0, history:[]});
}).then(loadAll).then(function() {
S.nick = name; S.role = “participant”; render();
});
}).catch(function() {
S.nick = name; S.role = “participant”; render();
});
}

function tryAdmin() {
if (S.pi === ADMIN_PW) {
loadAll().then(function() {
S.editPrizes = JSON.parse(JSON.stringify(S.prizes));
S.role = “admin”; render();
}).catch(function() {
S.editPrizes = JSON.parse(JSON.stringify(S.prizes));
S.role = “admin”; render();
});
} else {
S.pwErr = “비밀번호가 틀렸어요”; render();
}
}

function addMember() {
var name = S.newMember.trim();
if (!name) return;
if (S.members.indexOf(name) >= 0) { toast(“이미 있는 멤버예요”); return; }
S.members.push(name);
fset(”/gacha/members”, S.members);
if (!S.users[name]) {
S.users[name] = {stocks:0, history:[]};
fset(”/gacha/users/” + name, {stocks:0, history:[]});
}
S.newMember = “”; toast(“✅ “ + name + “ 추가됨!”);
}

function removeMember(name) {
S.members = S.members.filter(function(m) { return m !== name; });
fset(”/gacha/members”, S.members); render();
}

function giveStocks() {
var t = S.giveTarget, amt = Number(S.giveAmt);
if (!t) return;
if (!S.users[t]) S.users[t] = {stocks:0, history:[]};
S.users[t].stocks = (S.users[t].stocks || 0) + amt;
fset(”/gacha/users/” + t + “/stocks”, S.users[t].stocks);
toast(“📈 “ + t + “에게 “ + amt + “주 지급!”);
}

function savePrizes() {
for (var i = 0; i < S.editPrizes.length; i++) {
if (!S.editPrizes[i].id.trim() || !S.editPrizes[i].emoji.trim() || Number(S.editPrizes[i].rare) < 1) {
toast(“경품 정보를 확인해주세요”); return;
}
}
S.prizes = JSON.parse(JSON.stringify(S.editPrizes));
fset(”/gacha/prizes”, S.prizes);
toast(“✅ 경품 저장 완료!”);
}

function saveCost() {
fset(”/gacha/cost”, S.cost);
toast(“✅ 1판 = “ + S.cost + “주 저장!”);
}

function addPrize() {
S.editPrizes.push({id:“새 경품”, emoji:“🎁”, color:”#a78bfa”, rare:20}); render();
}

function removePrize(i) {
if (S.editPrizes.length <= 1) { toast(“최소 1개 필요”); return; }
S.editPrizes.splice(i, 1); render();
}

function doSpin() {
if (S.spinning || S.cdrop) return;
var cost = S.cost || 1;
var st = S.users[S.nick] ? (S.users[S.nick].stocks || 0) : 0;
if (st < cost) return;
S.cdrop = true; render();
sleep(900).then(function() {
S.cdrop = false; S.spinning = true; S.showPrize = false; S.prize = null; render();
return sleep(1800);
}).then(function() {
var won = randPrize();
var now = new Date().toLocaleString(“ko-KR”);
var entry = {prize:won.id, emoji:won.emoji, date:now};
var ns = st - cost;
var nh = [entry].concat(S.users[S.nick].history || []);
fpatch(”/gacha/users/” + S.nick, {stocks:ns, history:nh});
fset(”/gacha/log/” + Date.now(), {nick:S.nick, prize:won.id, emoji:won.emoji, date:now});
S.spinning = false; S.prize = won; S.showPrize = true;
S.users[S.nick] = {stocks:ns, history:nh};
render();
return sleep(3000);
}).then(function() {
S.showPrize = false; render();
});
}

function logout() {
S.role = null; S.nick = “”; S.ni = “”; S.pi = “”;
S.loginErr = “”; S.pwErr = “”;
S.spinning = false; S.cdrop = false; S.prize = null; S.showPrize = false;
render();
}
