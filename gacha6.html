<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0d0d1a"/>
<title>GACHA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0d0d1a;font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;color:#e8e6ff;min-height:100vh}
input,button,select{font-family:inherit}
.wrap{max-width:430px;margin:0 auto;min-height:100vh}
.hd{background:#161628;border-bottom:1px solid #2a2a45;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-weight:900;font-size:20px;background:linear-gradient(135deg,#ffd97d,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tabs{display:flex;border-bottom:1px solid #2a2a45;overflow-x:auto}
.tb{flex:1;padding:11px 4px;background:transparent;border:none;border-bottom:2px solid transparent;color:#6b69a0;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;min-width:55px}
.tb.on{color:#ffd97d;border-bottom-color:#ffd97d}
.pad{padding:16px}
.card{background:#161628;border-radius:18px;padding:18px 16px;border:1px solid #2a2a45;margin-bottom:12px}
.inp{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid #2a2a45;background:#0d0d1a;color:#e8e6ff;font-size:15px;outline:none}
.inp:focus{border-color:#ffd97d}
.btn{width:100%;padding:13px;border:none;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer}
.bg{background:linear-gradient(135deg,#ffd97d,#ffb347);color:#1a1000}
.bg:disabled{background:#2a2a45;color:#6b69a0;cursor:not-allowed}
.bd{background:linear-gradient(135deg,#4c1d95,#7c3aed);color:#e9d5ff}
.badge{background:rgba(255,217,125,.15);border:1px solid rgba(255,217,125,.3);border-radius:12px;padding:6px 14px;color:#ffd97d;font-weight:800;font-size:14px}
.mrow{background:#1e1e38;border-radius:12px;padding:13px 16px;margin-bottom:8px;border:1px solid #2a2a45;display:flex;align-items:center;justify-content:space-between}
.dbtn{padding:6px 12px;background:transparent;border:1px solid rgba(244,114,182,.4);color:#f472b6;border-radius:8px;font-size:12px;cursor:pointer;font-weight:700}
.lrow{background:#1e1e38;border-radius:12px;padding:12px 16px;margin-bottom:8px;border:1px solid #2a2a45;display:flex;align-items:center;gap:12px}
.empty{text-align:center;padding:60px 20px;color:#6b69a0}
.toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);background:#161628;border:1px solid #34d399;color:#34d399;padding:11px 24px;border-radius:24px;font-weight:800;font-size:14px;z-index:999;white-space:nowrap}
.cdrop{position:fixed;top:15%;left:50%;transform:translateX(-50%);font-size:32px;z-index:999;pointer-events:none;animation:fall .85s ease-in forwards}
@keyframes fall{0%{top:15%;opacity:1}100%{top:65%;opacity:0}}
.pburst{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:3px solid rgba(255,255,255,.3);animation:burstIn .5s ease forwards}
@keyframes burstIn{from{transform:translate(-50%,-50%) scale(.2);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}
select.inp{appearance:none;cursor:pointer}
.pedit{background:#1e1e38;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #2a2a45}
.sinp{padding:9px 11px;border-radius:10px;border:1.5px solid #2a2a45;background:#0d0d1a;color:#e8e6ff;font-size:14px;outline:none;width:100%}
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script>
var ADMIN_PW = "admin1234";
var FB = "https://gacha-31-default-rtdb.firebaseio.com";
var DP = [
  {id:"연차", emoji:"🏖️", color:"#ffd97d", rare:30},
  {id:"투피드", emoji:"🍔", color:"#34d399", rare:40},
  {id:"출근확인증", emoji:"📋", color:"#60a5fa", rare:30}
];

function fget(p) {
return fetch(FB + p + “.json”).then(function(r){return r.json();}).catch(function(){return null;});
}
function fset(p, v) {
return fetch(FB + p + “.json”, {method:“PUT”, headers:{“Content-Type”:“application/json”}, body:JSON.stringify(v)}).catch(function(){});
}
function fpatch(p, v) {
return fetch(FB + p + “.json”, {method:“PATCH”, headers:{“Content-Type”:“application/json”}, body:JSON.stringify(v)}).catch(function(){});
}

var S = {
role:null, nick:””,
members:[], users:{}, log:[], prizes:DP, cost:1,
adminTab:“members”, mTab:“machine”,
spinning:false, cdrop:false, prize:null, showPrize:false,
giveTarget:””, giveAmt:1, newMember:””,
ni:””, pi:””, loginErr:””, pwErr:””,
toast:””, editPrizes:null
};

var tT = null;
function toast(msg) {
S.toast = msg; render();
if(tT) clearTimeout(tT);
tT = setTimeout(function(){S.toast=””;render();}, 2500);
}
function sleep(ms) {return new Promise(function(r){setTimeout(r,ms);});}

function loadAll() {
return Promise.all([
fget(”/gacha/members”), fget(”/gacha/users”),
fget(”/gacha/log”), fget(”/gacha/prizes”), fget(”/gacha/cost”)
]).then(function(res) {
S.members = res[0] ? Object.values(res[0]) : [];
S.users = res[1] || {};
S.log = res[2] ? Object.values(res[2]).reverse() : [];
S.prizes = res[3] || DP;
S.cost = res[4] || 1;
}).catch(function(){});
}

function randPrize() {
var t = S.prizes.reduce(function(s,p){return s+Number(p.rare);}, 0);
var r = Math.random() * t;
for(var i=0; i<S.prizes.length; i++) {
r -= Number(S.prizes[i].rare);
if(r <= 0) return S.prizes[i];
}
return S.prizes[0];
}

function tryLogin() {
var name = S.ni.trim();
if(!name) return;
S.loginErr = “”;
fget(”/gacha/members”).then(function(m) {
var list = m ? Object.values(m) : [];
if(list.length > 0 && list.indexOf(name) < 0) {
S.loginErr = “등록된 멤버가 아니에요 🚫”;
render(); return;
}
return fget(”/gacha/users/” + name).then(function(ex) {
if(!ex) return fset(”/gacha/users/” + name, {stocks:0, history:[]});
}).then(function() {
return loadAll();
}).then(function() {
S.nick = name; S.role = “participant”; render();
});
}).catch(function() {
S.nick = name; S.role = “participant”; render();
});
}

function tryAdmin() {
if(S.pi === ADMIN_PW) {
loadAll().then(function() {
S.editPrizes = JSON.parse(JSON.stringify(S.prizes));
S.role = “admin”; render();
}).catch(function() {
S.editPrizes = JSON.parse(JSON.stringify(S.prizes));
S.role = “admin”; render();
});
} else {
S.pwErr = “비밀번호가 틀렸어요”; render();
}
}

function addMember() {
var name = S.newMember.trim();
if(!name) return;
if(S.members.indexOf(name) >= 0) {toast(“이미 있는 멤버예요”); return;}
S.members.push(name);
fset(”/gacha/members”, S.members);
if(!S.users[name]) {
S.users[name] = {stocks:0, history:[]};
fset(”/gacha/users/” + name, {stocks:0, history:[]});
}
S.newMember = “”; toast(“✅ “ + name + “ 추가됨!”);
}

function removeMember(name) {
S.members = S.members.filter(function(m){return m !== name;});
fset(”/gacha/members”, S.members); render();
}

function giveStocks() {
var t = S.giveTarget, amt = Number(S.giveAmt);
if(!t) return;
var nc = (S.users[t] ? S.users[t].stocks||0 : 0) + amt;
if(!S.users[t]) S.users[t] = {stocks:0, history:[]};
S.users[t].stocks = nc;
fset(”/gacha/users/” + t + “/stocks”, nc);
toast(“📈 “ + t + “에게 “ + amt + “주 지급!”);
}

function savePrizes() {
for(var i=0; i<S.editPrizes.length; i++) {
if(!S.editPrizes[i].id.trim()||!S.editPrizes[i].emoji.trim()||Number(S.editPrizes[i].rare)<1) {
toast(“경품 정보를 확인해주세요”); return;
}
}
S.prizes = JSON.parse(JSON.stringify(S.editPrizes));
fset(”/gacha/prizes”, S.prizes);
toast(“✅ 경품 저장 완료!”);
}

function saveCost() {
fset(”/gacha/cost”, S.cost);
toast(“✅ 설정 저장! 1판 = “ + S.cost + “주”);
}

function addPrize() {
S.editPrizes.push({id:“새 경품”, emoji:“🎁”, color:”#a78bfa”, rare:20}); render();
}

function removePrize(i) {
if(S.editPrizes.length <= 1) {toast(“최소 1개 필요”); return;}
S.editPrizes.splice(i, 1); render();
}

function doSpin() {
if(S.spinning || S.cdrop) return;
var cost = S.cost || 1;
var st = S.users[S.nick] ? S.users[S.nick].stocks||0 : 0;
if(st < cost) return;
S.cdrop = true; render();
sleep(900).then(function() {
S.cdrop = false; S.spinning = true; S.showPrize = false; S.prize = null; render();
return sleep(1800);
}).then(function() {
var won = randPrize();
var now = new Date().toLocaleString(“ko-KR”);
var entry = {prize:won.id, emoji:won.emoji, date:now};
var ns = st - cost;
var nh = [entry].concat(S.users[S.nick].history || []);
fpatch(”/gacha/users/” + S.nick, {stocks:ns, history:nh});
fset(”/gacha/log/” + Date.now(), {nick:S.nick, prize:won.id, emoji:won.emoji, date:now});
S.spinning = false; S.prize = won; S.showPrize = true;
S.users[S.nick] = {stocks:ns, history:nh};
fget(”/gacha/log”).then(function(l) {
S.log = l ? Object.values(l).reverse() : [];
});
render();
return sleep(3000);
}).then(function() {
S.showPrize = false; render();
});
}

function logout() {
S.role = null; S.nick = “”; S.ni = “”; S.pi = “”;
S.loginErr = “”; S.pwErr = “”; S.spinning = false;
S.cdrop = false; S.prize = null; S.showPrize = false;
render();
}

function g(id, ev, fn) {
var e = document.getElementById(id);
if(e) e.addEventListener(ev, fn);
}

function machineSVG(stocks, spinning, prize, showPrize) {
var bc = [”#ffd97d”,”#f472b6”,”#c084fc”,”#60a5fa”,”#34d399”,”#fb923c”,”#a78bfa”];
var bp = [{cx:95,cy:82,r:14},{cx:145,cy:72,r:12},{cx:122,cy:130,r:15},{cx:76,cy:118,r:11},{cx:150,cy:116,r:13},{cx:108,cy:62,r:9},{cx:158,cy:96,r:9}];
var balls = “”;
for(var i=0; i<bp.length; i++) {
var b = bp[i];
if(spinning) {
balls += ‘<circle cx="'+b.cx+'" cy="'+b.cy+'" r="'+b.r+'" fill="'+bc[i]+'" opacity=".95"><animateTransform attributeName="transform" type="rotate" from="'+(i*50)+' 118 100" to="'+(360+i*50)+' 118 100" dur="'+(0.3+i*0.05)+'s" repeatCount="indefinite"/></circle>’;
} else {
balls += ‘<circle cx="'+b.cx+'" cy="'+b.cy+'" r="'+b.r+'" fill="'+bc[i]+'" opacity=".9"/>’;
}
}
var burst = “”;

burst = ‘<div class="pburst" style="width:120px;height:120px;background:radial-gradient(circle,'+prize.color+'cc,'+prize.color+'44);box-shadow:0 0 40px '+prize.color+'88"><div style="font-size:38px">’+prize.emoji+’</div><div style="color:#fff;font-weight:900;font-size:12px;margin-top:4px">’+prize.id+’</div></div>’;
}
return ‘<div style="position:relative;width:260px;margin:0 auto">’
+ ‘<svg viewBox="0 0 240 280" width="240" height="260">’
+ ‘<defs>’
+ ‘<radialGradient id="bg1" cx="38%" cy="32%"><stop offset="0%" stop-color="#1a1035"/><stop offset="100%" stop-color="#0a0820"/></radialGradient>’
+ ‘<radialGradient id="sh1" cx="28%" cy="22%"><stop offset="0%" stop-color="white" stop-opacity=".18"/><stop offset="50%" stop-color="white" stop-opacity="0"/></radialGradient>’
+ ‘<linearGradient id="rim1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffd97d"/><stop offset="33%" stop-color="#f472b6"/><stop offset="66%" stop-color="#c084fc"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>’
+ ‘<linearGradient id="base1" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#1e1040"/><stop offset="100%" stop-color="#0f0828"/></linearGradient>’
+ ‘<linearGradient id="knob1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffd97d"/><stop offset="100%" stop-color="#f472b6"/></linearGradient>’
+ ‘</defs>’
+ ‘<ellipse cx="118" cy="268" rx="72" ry="10" fill="#000" opacity=".4"/>’
+ ‘<rect x="36" y="198" width="148" height="65" rx="18" fill="url(#base1)"/>’
+ ‘<rect x="36" y="198" width="148" height="65" rx="18" fill="none" stroke="url(#rim1)" stroke-width="1.5" opacity=".6"/>’
+ ‘<rect x="86" y="150" width="60" height="56" rx="10" fill="#120830"/>’
+ ‘<rect x="86" y="150" width="60" height="56" rx="10" fill="none" stroke="url(#rim1)" stroke-width="1" opacity=".4"/>’
+ ‘<ellipse cx="118" cy="230" rx="42" ry="15" fill="#080418" opacity=".9"/>’
+ ‘<ellipse cx="118" cy="228" rx="36" ry="11" fill="#100828"/>’
+ ‘<circle cx="118" cy="98" r="82" fill="none" stroke="url(#rim1)" stroke-width="3" opacity=".5"/>’
+ ‘<circle cx="118" cy="98" r="80" fill="url(#bg1)"/>’
+ balls
+ ‘<circle cx="118" cy="98" r="80" fill="url(#sh1)"/>’
+ ‘<circle cx="118" cy="98" r="80" fill="none" stroke="url(#rim1)" stroke-width="2" opacity=".9"/>’
+ ‘<rect x="184" y="158" width="12" height="46" rx="6" fill="#1e1040"/>’
+ ‘<circle cx="190" cy="207" r="12" fill="url(#knob1)"/>’
+ ‘<circle cx="190" cy="207" r="8" fill="rgba(255,255,255,.3)"/>’
+ ‘<circle cx="187" cy="204" r="3" fill="white" opacity=".5"/>’
+ ‘<rect x="50" y="214" width="72" height="26" rx="9" fill="#050210"/>’
+ ‘<rect x="50" y="214" width="72" height="26" rx="9" fill="none" stroke="url(#rim1)" stroke-width=".8" opacity=".7"/>’
+ ‘<text x="86" y="232" text-anchor="middle" fill="url(#rim1)" font-size="11" font-weight="900" font-family="monospace">’+String(stocks).padStart(2,“0”)+’ \uC8FC</text>’
+ ‘</svg>’
+ burst
+ ‘</div>’;
}

function render() {
var root = document.getElementById(“root”);
if(!root) return;
var tH = S.toast ? ‘<div class="toast">’+S.toast+’</div>’ : “”;
var cH = S.cdrop ? ‘<div class="cdrop">📈</div>’ : “”;
var html = “”;

if(!S.role) {
html = tH
+ ‘<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">’
+ ‘<div style="width:100%;max-width:360px">’
+ ‘<div style="text-align:center;margin-bottom:32px">’
+ ‘<div style="font-size:60px;margin-bottom:10px">🎰</div>’
+ ‘<div style="font-weight:900;font-size:28px;background:linear-gradient(135deg,#ffd97d,#f472b6,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent">GACHA</div>’
+ ‘<div style="color:#6b69a0;font-size:13px;margin-top:6px">행운을 뽑아보세요 ✨</div>’
+ ‘</div>’
+ ‘<div class="card" style="margin-bottom:14px">’
+ ‘<div style="font-weight:800;font-size:15px;margin-bottom:14px;color:#c084fc">👤 참여자</div>’
+ ‘<input class="inp" id="ni" placeholder="닉네임 입력" value="'+S.ni+'"/>’
+ (S.loginErr ? ‘<div style="color:#f472b6;font-size:12px;margin-top:8px;font-weight:700">’+S.loginErr+’</div>’ : ‘’)
+ ‘<button class=“btn bg” id=“lb” style=“margin-top:12px” ‘+(S.ni.trim()?’’:‘disabled’)+’>입장하기 →</button>’
+ ‘</div>’
+ ‘<div class="card">’
+ ‘<div style="font-weight:800;font-size:15px;margin-bottom:14px;color:#a78bfa">🔐 관리자</div>’
+ ‘<input class="inp" id="pi" type="password" placeholder="관리자 비밀번호" value="'+S.pi+'" style="'+(S.pwErr?'border-color:#f472b6':'')+'">’
+ (S.pwErr ? ‘<div style="color:#f472b6;font-size:12px;margin-top:8px;font-weight:700">’+S.pwErr+’</div>’ : ‘’)
+ ‘<button class="btn bd" id="ab" style="margin-top:12px">관리자 입장</button>’
+ ‘</div>’
+ ‘</div></div>’;
root.innerHTML = html;
g(“ni”,“input”,function(e){S.ni=e.target.value;S.loginErr=””;var b=document.getElementById(“lb”);if(b)b.disabled=!S.ni.trim();});
g(“ni”,“keydown”,function(e){if(e.key===“Enter”)tryLogin();});
g(“pi”,“input”,function(e){S.pi=e.target.value;S.pwErr=””;});
g(“pi”,“keydown”,function(e){if(e.key===“Enter”)tryAdmin();});
g(“lb”,“click”,tryLogin);
g(“ab”,“click”,tryAdmin);
return;
}

if(S.role === “admin”) {
var tabs = [[“members”,“👥 멤버”],[“give”,“📈 지급”],[“prizes”,“🎁 경품”],[“settings”,“⚙️ 설정”],[“users”,“📊 현황”],[“log”,“📜 기록”]];
var tc = “”;
var t = S.adminTab;

```
if(t === "members") {
  var rows = "";
  for(var i=0;i<S.members.length;i++) {
    var m = S.members[i];
    var st = S.users[m] ? S.users[m].stocks||0 : 0;
    var ht = S.users[m] ? (S.users[m].history||[]).length : 0;
    rows += '<div class="mrow"><div><div style="font-weight:800">'+m+'</div><div style="font-size:12px;color:#6b69a0;margin-top:2px">📈 '+st+'주 · '+ht+'회</div></div><button class="dbtn" onclick="removeMember(\''+m+'\')">삭제</button></div>';
  }
  tc = '<div class="card"><div style="font-weight:800;color:#ffd97d;margin-bottom:12px">멤버 등록</div>'
    + '<div style="display:flex;gap:8px"><input class="inp" id="nmi" placeholder="닉네임" value="'+S.newMember+'" style="flex:1"/>'
    + '<button class="btn bg" id="amb" style="width:auto;padding:12px 18px" '+(S.newMember.trim()?'':'disabled')+'>추가</button></div></div>'
    + '<div style="color:#6b69a0;font-size:13px;margin-bottom:10px;font-weight:700">등록된 멤버 '+S.members.length+'명</div>'
    + (S.members.length===0 ? '<div class="empty">멤버를 먼저 등록해주세요</div>' : rows);
}

if(t === "give") {
  var opts = '<option value="">-- 선택 --</option>';
  for(var i=0;i<S.members.length;i++) {
    var m = S.members[i];
    var st = S.users[m] ? S.users[m].stocks||0 : 0;
    opts += '<option value="'+m+'" '+(S.giveTarget===m?'selected':'')+'>'+m+' ('+st+'주)</option>';
  }
  var qb = "";
  [1,3,5,10].forEach(function(n){qb += '<button class="qb '+(S.giveAmt===n?'on':'')+'" onclick="S.giveAmt='+n+';render()">'+n+'</button>';});
  tc = S.members.length===0 ? '<div class="empty">먼저 멤버를 등록해주세요</div>'
    : '<div class="card">'
    + '<div style="font-weight:800;color:#ffd97d;margin-bottom:14px">주식 지급</div>'
    + '<div style="margin-bottom:12px"><label style="font-size:12px;color:#6b69a0;display:block;margin-bottom:6px;font-weight:700">멤버 선택</label>'
    + '<select class="inp" id="gts">'+opts+'</select></div>'
    + '<div style="margin-bottom:16px"><label style="font-size:12px;color:#6b69a0;display:block;margin-bottom:8px;font-weight:700">주식 수: <span style="color:#ffd97d;font-size:16px">'+S.giveAmt+'주</span></label>'
    + '<div style="display:flex;gap:8px;margin-bottom:10px">'+qb+'</div>'
    + '<input type="range" id="gr" min="0" max="100" value="'+S.giveAmt+'" style="width:100%;accent-color:#ffd97d"/></div>'
    + '<button class="btn bg" id="gcb" '+(S.giveTarget?'':'disabled')+'>📈 '+(S.giveTarget ? S.giveTarget+'에게 '+S.giveAmt+'주 지급' : '멤버를 선택해주세요')+'</button></div>';
}

if(t === "prizes") {
  var ep = S.editPrizes || S.prizes;
  var total = ep.reduce(function(s,p){return s+Number(p.rare);}, 0);
  var rows = "";
  for(var i=0;i<ep.length;i++) {
    var p = ep[i];
